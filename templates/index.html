<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptor</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</head>
<body>
    <audio id="save-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <div id="toast-container"></div>

    <div class="outer-container">
        <div id="tabs-container" class="tabs"></div>
        <div class="card">
            <div class="toolbar">
                <div style="display: flex; gap: 5px;">
                    <!-- 1. 文字のズーム -->
                    <button class="font-btn" onclick="changeFontSize(0.2)" title="文字を大きく"><span class="material-symbols-outlined">zoom_in</span></button>
                    <button class="font-btn" onclick="changeFontSize(-0.2)" title="文字を小さく"><span class="material-symbols-outlined">zoom_out</span></button>
                    <div class="mobile-font-slider">
                        <span class="material-symbols-outlined" style="font-size: 18px; color: #666;">text_fields</span>
                        <input type="range" id="font-slider" min="0.8" max="3.0" step="0.1" value="1.2" oninput="handleSliderChange(this.value)">
                    </div>
                    <!-- 2. 練習モード -->
                    <button class="font-btn" onclick="togglePracticeMode()" title="練習モード"><span class="material-symbols-outlined" id="practice-icon">visibility_off</span></button>
                    <!-- 3. 本番モード -->
                    <button class="font-btn" id="production-mode-btn" onclick="toggleProductionMode()" title="本番モード"><span class="material-symbols-outlined" id="production-icon">cast</span></button>
                    <!-- 4. タイマー -->
                    <button class="font-btn" id="timer-open-btn" onclick="openTimerModal()" title="タイマー"><span class="material-symbols-outlined">timer</span></button>
                    <!-- 5. 重要項目のみ表示 -->
                    <button class="font-btn" onclick="toggleFilterImportant()" title="重要項目のみ表示"><span class="material-symbols-outlined" id="filter-icon">filter_alt</span></button>
                    <!-- 6. 全画面表示 -->
                    <button class="font-btn" onclick="toggleFullscreen()" title="全画面表示"><span class="material-symbols-outlined">fullscreen</span></button>
                    <!-- 7. ダークモード -->
                    <button class="font-btn" onclick="toggleDarkMode()" title="ダークモード切替"><span class="material-symbols-outlined" id="dark-mode-icon">dark_mode</span></button>
                    <!-- 8. 印刷 -->
                    <button class="font-btn" onclick="printData()" title="印刷・PDF保存"><span class="material-symbols-outlined">print</span></button>
                    <!-- 9. リセット -->
                    <button class="font-btn" onclick="resetAllData()" title="全てのデータをリセット"><span class="material-symbols-outlined" style="color: #e74c3c;">restart_alt</span></button>
                </div>
                <!-- 10. 保存 -->
                <button class="save-btn" onclick="saveData()">
                    <span class="material-symbols-outlined" style="font-size: 20px;">save</span> 保存
                </button>
            </div>

            <div id="breadcrumb" class="breadcrumb"></div>

            <div class="hierarchy-nav">
                <div class="nav-group">
                    中カテゴリ: 
                    <select id="mid-select" onchange="changeMid()"></select>
                    <button class="icon-btn" onclick="addMid()" title="追加"><span class="material-symbols-outlined">add</span></button>
                    <button class="icon-btn" onclick="renameMid()" title="名前の変更"><span class="material-symbols-outlined">edit</span></button>
                    <button class="icon-btn" onclick="deleteMid()" title="削除"><span class="material-symbols-outlined">delete</span></button>
                </div>
                <div class="nav-group">
                    小カテゴリ: 
                    <select id="small-select" onchange="changeSmall()"></select>
                    <button class="icon-btn" onclick="addSmall()" title="追加"><span class="material-symbols-outlined">add</span></button>
                    <button class="icon-btn" onclick="renameSmall()" title="名前の変更"><span class="material-symbols-outlined">edit</span></button>
                    <button class="icon-btn" onclick="deleteSmall()" title="削除"><span class="material-symbols-outlined">delete</span></button>
                </div>
            </div>
            
            <div class="sticky-note">
                <div class="color-picker">
                    <div class="color-dot" style="background-color: #fff9c4;" onclick="setNoteColor('#fff9c4')"></div>
                    <div class="color-dot" style="background-color: #e3f2fd;" onclick="setNoteColor('#e3f2fd')"></div>
                    <div class="color-dot" style="background-color: #e8f5e9;" onclick="setNoteColor('#e8f5e9')"></div>
                    <div class="color-dot" style="background-color: #fce4ec;" onclick="setNoteColor('#fce4ec')"></div>
                </div>
                <div class="sticky-note-title">MEMO</div>
                <textarea id="memo" placeholder=""></textarea>
            </div>

            <div style="display: flex; align-items: flex-start; gap: 10px;">
                <button id="star-btn" class="icon-btn" onclick="toggleStar()" title="重要マーク" style="margin-top: 5px; border: none; background: transparent;">
                    <span class="material-symbols-outlined" id="star-icon">star</span>
                </button>
                <textarea id="question" placeholder="" rows="1"></textarea>
            </div>
            
            <div style="position: relative;">
                <textarea id="answer" placeholder="ここに回答を入力してください..."></textarea>
                <div id="practice-overlay" class="practice-overlay">
                    <button onclick="revealAnswer()" class="save-btn">答えを確認する</button>
                </div>
            </div>
            <div class="card-footer">
                <img src="{{ url_for('static', filename='logo.svg') }}" class="footer-logo" alt="logo">
                <div class="footer-right">
                    <div id="char-count" class="char-count">0 文字 (約 0秒)</div>
                    <button class="icon-btn scroll-btn" onclick="toggleAutoScroll()" title="自動スクロール">
                        <span class="material-symbols-outlined" id="scroll-icon" style="font-size: 18px;">south</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab add" onclick="addBig()" title="大タブ（大カテゴリ）を追加">
            <span class="material-symbols-outlined">add</span>
        </button>
        <button class="fab edit" onclick="renameBig()" title="現在の大タブの名前を変更">
            <span class="material-symbols-outlined">edit</span>
        </button>
        <button class="fab delete" onclick="deleteBig()" title="現在の大タブを削除">
            <span class="material-symbols-outlined">delete</span>
        </button>
        <button class="fab search" onclick="openSearchModal()" title="検索">
            <span class="material-symbols-outlined">search</span>
        </button>
    </div>

    <!-- 検索モーダル -->
    <div id="search-modal" class="modal-overlay" onclick="closeSearchModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">キーワード検索</div>
            <input type="text" id="modal-search-input" placeholder="検索したい文字を入力..." oninput="handleSearch(this.value)">
            <div id="modal-search-results" class="search-results-container active"></div>
        </div>
    </div>

    <!-- タイマーパネル（左下に配置） -->
    <div id="timer-modal" class="timer-panel" style="display: none;">
        <div class="timer-content">
            <div class="timer-header">
                <span>タイマー</span>
                <button class="timer-mini-btn" onclick="closeTimerModal()">×</button>
            </div>
            <div class="timer-large-display" id="modal-timer-display">00:00</div>
            <div class="timer-target-section">
                <div class="timer-label"><span class="material-symbols-outlined" style="font-size: 16px;">flag</span> 目標時間</div>
                <div class="timer-target-adjust">
                <div class="adjust-group">
                        <button class="adjust-btn" onclick="adjustTarget('min', -1)"><span class="material-symbols-outlined">remove</span></button>
                    <div class="target-val"><input type="number" id="target-min" value="0" min="0">分</div>
                        <button class="adjust-btn" onclick="adjustTarget('min', 1)"><span class="material-symbols-outlined">add</span></button>
                </div>
                <div class="adjust-group">
                        <button class="adjust-btn" onclick="adjustTarget('sec', -10)"><span class="material-symbols-outlined">keyboard_double_arrow_left</span></button>
                    <div class="target-val"><input type="number" id="target-sec" value="0" min="0" max="59">秒</div>
                        <button class="adjust-btn" onclick="adjustTarget('sec', 10)"><span class="material-symbols-outlined">keyboard_double_arrow_right</span></button>
                    </div>
                </div>
            </div>
            <div class="timer-presets">
                <button onclick="setTargetPreset(0, 30)">30秒</button>
                <button onclick="setTargetPreset(1, 0)">1分</button>
                <button onclick="setTargetPreset(3, 0)">3分</button>
                <button onclick="setTargetPreset(5, 0)">5分</button>
            </div>
            <div class="timer-actions">
                <button class="timer-btn toggle" id="modal-timer-toggle-btn" onclick="toggleTimer()"><span class="material-symbols-outlined">play_arrow</span></button>
                <button class="timer-btn reset" onclick="resetTimer()"><span class="material-symbols-outlined">replay</span></button>
            </div>
        </div>
    </div>
</body>
</html>
